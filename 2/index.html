<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Number</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="main.js" defer></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gray-100">

  <form 
    onsubmit="genNumber(); return false;" 
    class="flex flex-col gap-6 bg-white p-8 rounded-lg shadow w-80 text-center"
  >

    <div>
      <p class="text-gray-600 text-sm">Expression</p>
      <p id="exprText" class="font-mono text-2xl font-bold mt-1">—</p>
    </div>

    <button 
      type="submit"
      class="bg-blue-500 text-white w-full py-3 rounded hover:bg-blue-600 transition"
    >
      Get Expression
    </button>

    <button 
      type="button"
      class="bg-red-500 text-white w-full py-3 rounded hover:bg-red-600 transition"
      onclick="goHome()"
    >
      Home
    </button>

  </form>

</body>
</html>
