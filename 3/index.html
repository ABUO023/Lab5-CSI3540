<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Expression</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="main.js" defer></script>
</head>

<body onload="genNumber()" class="flex items-center justify-center min-h-screen bg-gray-100">

  <div class="flex flex-col gap-6 bg-white p-8 rounded-lg shadow w-80 text-center">

    <div>
      <p class="text-gray-600">Expression:</p>
      <p id="exprText" class="font-mono text-2xl font-bold mt-1">—</p>

      <p class="text-gray-600 mt-3">Correct Answer:</p>
      <p id="answerText" class="font-mono text-lg mt-1">—</p>
    </div>

    <button 
      onclick="genNumber()"
      class="bg-blue-500 text-white w-full py-3 rounded hover:bg-blue-600 transition"
    >
      New Expression
    </button>

    <button 
      onclick="goHome()"
      class="bg-red-500 text-white w-full py-3 rounded hover:bg-red-600 transition"
    >
      Home
    </button>

  </div>

</body>
</html>
