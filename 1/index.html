<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Number</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="main.js" defer></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gray-100">

  <form 
    onsubmit="CheckNumber(); return false;" 
    class="flex flex-col gap-4 bg-white p-8 rounded-lg shadow w-200"
  >

    <div class="text-center">
      <p class="font-bold text-lg">Hello!</p>
      <p class="text-gray-600">Please enter a phone number</p>
    </div>

    <input 
      type="text" 
      id="numberInput"
      class="border p-2 rounded w-full"
      placeholder="Enter number"
    >

    <button 
      type="submit"
      class="bg-blue-500 text-white w-full py-2 rounded hover:bg-blue-600"
    >
      Submit
    </button>

    <button 
      type="button"
      class="bg-red-500 text-white w-full py-2 rounded hover:bg-red-600"
      onclick="goHome()"
    >
      Home
    </button>

  </form>

</body>
</html>
